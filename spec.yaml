openapi: 3.1.0
info:
  title: SSE to Poe Protocol Adapter
  description: |
    This API acts as an adapter between Server-Sent Events (SSE) and the Poe Protocol.
    It allows for converting SSE streams into the format expected by the Poe Protocol,
    facilitating integration between systems using these different communication protocols.
  version: 1.0.0
  contact:
    name: API Support
    url: https://example.com/support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.example.com/v1
    description: Example production placeholder server
  - url: https://api-dev.example.com/v1
    description: Example development placeholder server

paths:
  /stream-to-poe:
    post:
      summary: Convert an SSE stream to Poe Protocol format
      description: |
        This endpoint accepts an SSE stream URL and converts the incoming event stream
        to the format expected by the Poe Protocol, relaying the response back to the client.
      operationId: convertSseToPoe
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SseConversionRequest'
      responses:
        '200':
          description: SSE stream converted to Poe Protocol format
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: meta
                  data: {"content_type": "text/markdown"}
                  
                  event: text
                  data: {"text": "Streamed content from SSE"}
                  
                  event: done
                  data: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: SSE stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /poe-to-stream:
    post:
      summary: Convert Poe Protocol messages to SSE streams
      description: |
        This endpoint accepts Poe Protocol messages and converts them into SSE streams,
        facilitating integration with systems that expect SSE format.
      operationId: convertPoeToSse
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoeConversionRequest'
      responses:
        '200':
          description: Poe Protocol message converted to SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: message
                  data: "Content from Poe"
                  id: 1
                  
                  event: message
                  data: "More content from Poe"
                  id: 2
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /poe/query:
    post:
      summary: Handle Poe query requests
      description: |
        Endpoint that accepts Poe query requests and processes them according to the Poe Protocol.
      operationId: handlePoeQuery
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoeQueryRequest'
      responses:
        '200':
          description: Successful response to query
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: meta
                  data: {"content_type": "text/markdown", "suggested_replies": true}
                  
                  event: text
                  data: {"text": "Response to the query"}
                  
                  event: suggested_reply
                  data: {"text": "Follow-up question?"}
                  
                  event: done
                  data: {}
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /poe/settings:
    post:
      summary: Handle Poe settings requests
      description: |
        Endpoint that accepts Poe settings requests and returns bot settings according to the Poe Protocol.
      operationId: handlePoeSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoeSettingsRequest'
      responses:
        '200':
          description: Bot settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoeSettingsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /poe/report-reaction:
    post:
      summary: Handle Poe reaction reports
      description: |
        Endpoint that accepts reports of user reactions to bot messages according to the Poe Protocol.
      operationId: handlePoeReactionReport
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoeReactionRequest'
      responses:
        '200':
          description: Reaction received
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Acknowledgement status for the reaction report
                    example: "received"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /poe/report-error:
    post:
      summary: Handle Poe error reports
      description: |
        Endpoint that accepts error reports from Poe according to the Poe Protocol.
      operationId: handlePoeErrorReport
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoeErrorRequest'
      responses:
        '200':
          description: Error report received
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Acknowledgement status for the error report
                    example: "received"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Identifier:
      type: string
      pattern: ^[a-z]{1,3}-[a-z0-9=]{32}$
      description: |
        A globally unique identifier used in the Poe Protocol. Consists of 1-3 lowercase ASCII
        characters, followed by a hyphen, followed by 32 lowercase alphanumeric ASCII characters
        or = characters.
      example: "m-abcdefghijklmnopqrstuvwxyz123456"

    SseConversionRequest:
      type: object
      description: Request payload for converting an upstream SSE stream into Poe Protocol events.
      required:
        - sseUrl
      properties:
        sseUrl:
          type: string
          format: uri
          description: URL of the SSE stream to convert
          example: "https://api.example.com/events"
        contentType:
          type: string
          default: "text/markdown"
          enum:
            - text/markdown
            - text/plain
          description: Content type to use in the Poe Protocol meta event
        suggestedReplies:
          type: boolean
          default: false
          description: Whether to suggest replies to the user
        headers:
          type: object
          additionalProperties:
            type: string
          description: Additional headers to send with the SSE request
          example:
            Authorization: "Bearer token123"

    PoeConversionRequest:
      type: object
      description: Request payload for converting Poe Protocol message content into an SSE stream.
      required:
        - content
      properties:
        content:
          type: string
          description: Content to convert to an SSE stream
          example: "This is some Poe content to be converted to SSE"
        eventType:
          type: string
          default: "message"
          description: The SSE event type to use
        eventId:
          type: string
          description: Optional event ID to include in the SSE stream
        retryInterval:
          type: integer
          format: int32
          minimum: 0
          description: Optional retry interval in milliseconds for the SSE client

    PoeQueryRequest:
      type: object
      description: Poe Protocol query request delivered to a server bot.
      required:
        - version
        - type
        - query
        - message_id
        - user_id
        - conversation_id
      properties:
        version:
          type: string
          description: The API version that the server is using
          example: "1.0"
        type:
          type: string
          enum:
            - query
          description: The type of request
          example: "query"
        query:
          type: array
          description: Messages in the conversation
          items:
            type: object
            required:
              - role
              - content
              - content_type
              - timestamp
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - bot
                description: The role of the message sender
                example: "user"
              content:
                type: string
                description: The text of the message
                example: "What is the capital of Nepal?"
              content_type:
                type: string
                enum:
                  - text/plain
                  - text/markdown
                description: The content type of the message
                example: "text/markdown"
              timestamp:
                type: integer
                format: int64
                description: The time the message was sent, in microseconds since the Unix epoch
                example: 1678299819427621
              message_id:
                description: Identifier of the message in the conversation, when present
                $ref: '#/components/schemas/Identifier'
              feedback:
                type: array
                description: Feedback entries previously recorded for the message
                items:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum:
                        - like
                        - dislike
                      description: Feedback sentiment for the message
                      example: "like"
                    reason:
                      type: string
                      description: Optional reason supplied with the feedback
                      example: "Helpful answer"
              attachments:
                type: array
                description: Files attached to the message
                items:
                  type: object
                  required:
                    - url
                    - content_type
                    - name
                  properties:
                    url:
                      type: string
                      format: uri
                      description: URL where the attachment can be retrieved
                      example: "https://example.com/files/image.png"
                    content_type:
                      type: string
                      description: MIME type of the attachment
                      example: "image/png"
                    name:
                      type: string
                      description: Original attachment filename
                      example: "image.png"
                    parsed_content:
                      type: string
                      description: Text extracted from the attachment, when available
                      example: "An image showing a mountain landscape"
              metadata:
                type: string
                nullable: true
                description: Arbitrary data set by a server bot
        message_id:
          description: Identifier for the Poe query message
          $ref: '#/components/schemas/Identifier'
        user_id:
          description: Identifier for the Poe user
          $ref: '#/components/schemas/Identifier'
        conversation_id:
          description: Identifier for the Poe conversation
          $ref: '#/components/schemas/Identifier'
        metadata:
          description: Identifier for server bot metadata associated with the query
          $ref: '#/components/schemas/Identifier'
          nullable: true
        temperature:
          type: number
          format: float
          minimum: 0
          description: Temperature for the LLM
          example: 0.7
        skip_system_prompt:
          type: boolean
          description: Whether to skip the system prompt
          example: false
        stop_sequences:
          type: array
          items:
            type: string
          description: Sequences that should stop the LLM response
          example: ["###", "END"]
        logit_bias:
          type: object
          additionalProperties:
            type: number
            format: float
            minimum: -100
            maximum: 100
          description: Bias for specific tokens
          example:
            "50256": -100

    PoeSettingsRequest:
      type: object
      description: Poe Protocol settings request delivered to a server bot.
      required:
        - version
        - type
      properties:
        version:
          type: string
          description: The API version that the server is using
          example: "1.0"
        type:
          type: string
          enum:
            - settings
          description: The type of request
          example: "settings"

    PoeSettingsResponse:
      type: object
      description: Settings response returned by a server bot to configure Poe features.
      properties:
        server_bot_dependencies:
          type: object
          additionalProperties:
            type: integer
            format: int32
            minimum: 0
          description: |
            Bots that this server bot will access through the bot query API,
            with the number of calls expected to be made to each
          example:
            "GPT-3.5-Turbo": 1
        allow_attachments:
          type: boolean
          default: false
          description: Whether to allow users to send attachments to the bot
        expand_text_attachments:
          type: boolean
          default: true
          description: Whether to parse text files and send their content
        enable_image_comprehension:
          type: boolean
          default: false
          description: Whether to use image vision to generate descriptions of image attachments
        introduction_message:
          type: string
          description: Message that the bot will use to introduce itself
          example: "Hi! I'm a helpful assistant. How can I help you today?"
        enforce_author_role_alternation:
          type: boolean
          default: false
          description: Whether to concatenate messages to follow strict user/bot alternation
        enable_multi_bot_chat_prompting:
          type: boolean
          default: false
          description: Whether to combine previous chat history for multi-bot context

    PoeReactionRequest:
      type: object
      description: Poe Protocol reaction report sent when a user reacts to a bot message.
      required:
        - version
        - type
        - message_id
        - user_id
        - conversation_id
        - reaction
      properties:
        version:
          type: string
          description: The API version that the server is using
          example: "1.0"
        type:
          type: string
          enum:
            - report_reaction
          description: The type of request
          example: "report_reaction"
        message_id:
          description: Identifier for the Poe message that received the reaction
          $ref: '#/components/schemas/Identifier'
        user_id:
          description: Identifier for the Poe user who sent the reaction
          $ref: '#/components/schemas/Identifier'
        conversation_id:
          description: Identifier for the Poe conversation containing the message
          $ref: '#/components/schemas/Identifier'
        reaction:
          type: string
          enum:
            - like
            - dislike
            - heart
            - laughing
            - surprised
            - sad
          description: The type of reaction
          example: "heart"

    PoeErrorRequest:
      type: object
      description: Poe Protocol error report sent when Poe observes a bot response problem.
      required:
        - version
        - type
        - message
      properties:
        version:
          type: string
          description: The API version that the server is using
          example: "1.0"
        type:
          type: string
          enum:
            - report_error
          description: The type of request
          example: "report_error"
        message:
          type: string
          description: A string describing the error
          example: "Invalid content type in response"
        metadata:
          type: object
          description: Metadata that may be helpful in diagnosing the error
          example:
            conversation_id: "c-abcdefghijklmnopqrstuvwxyz123456"

    Error:
      type: object
      description: Standard JSON error payload returned by non-success responses.
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "invalid_request"
        message:
          type: string
          description: Error message
          example: "Invalid request parameters"
        details:
          type: object
          description: Additional error details
          example:
            parameter: "sseUrl"
            reason: "Invalid URL format"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key sent in the X-API-Key header for adapter endpoints.
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication used by Poe Protocol callbacks.
